<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数据集生成器</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            text-align: center;
            padding: 32px 0 24px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 6px;
            font-size: 14px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: "";
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            height: 38px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
            min-width: 120px;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            height: 38px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Column list */
        .col-list {
            margin-top: 16px;
        }

        .col-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            transition: all 0.2s;
        }

        .col-item:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.08);
        }

        .col-item .form-group {
            flex: 1;
            min-width: 100px;
        }

        .col-item .form-group.col-name {
            min-width: 100px;
            flex: 1.2;
        }

        .col-item .form-group.col-dtype {
            min-width: 120px;
        }

        .col-item .form-group.col-choices {
            min-width: 160px;
            flex: 1.5;
        }

        .col-item .btn-danger {
            height: 32px;
            padding: 0 12px;
            font-size: 13px;
        }

        .col-number {
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            margin-top: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            background: #f1f5f9;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-true { background: #dcfce7; color: #16a34a; }
        .badge-false { background: #fee2e2; color: #dc2626; }
        .badge-null { background: #f1f5f9; color: #94a3b8; }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 18px;
            border: 1px solid var(--border);
        }

        .stat-item .stat-val {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 24px;
        }

        .loading.active { display: block; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show { transform: translateX(0); }

        .toast-error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        .toast-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .col-item.has-error {
            border-color: var(--danger) !important;
            background: #fef2f2 !important;
        }

        .field-error {
            color: var(--danger);
            font-size: 11px;
            margin-top: 2px;
        }

        .form-group input.input-error,
        .form-group select.input-error {
            border-color: var(--danger) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--danger);
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .error-banner.show { display: flex; align-items: center; gap: 8px; }

        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .col-item { flex-direction: column; align-items: flex-start; }
            .col-item .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>随机数据集生成器</h1>
            <p>配置列规则，快速生成测试数据集，支持 CSV / JSON 导出</p>
        </header>

        <!-- Dataset Config -->
        <div class="card">
            <div class="card-title">数据集配置</div>
            <div class="form-row">
                <div class="form-group">
                    <label>行数</label>
                    <input type="number" id="row-count" value="50" min="1" max="100000">
                </div>
                <div class="form-group">
                    <label>随机种子（可选）</label>
                    <input type="number" id="seed" placeholder="留空则随机">
                </div>
            </div>
        </div>

        <!-- Column Config -->
        <div class="card">
            <div class="card-title">列配置</div>
            <div class="form-row">
                <div class="form-group col-name">
                    <label>列名</label>
                    <input type="text" id="new-col-name" placeholder="如：user_id">
                </div>
                <div class="form-group col-dtype">
                    <label>数据类型</label>
                    <select id="new-col-dtype">
                        <option value="integer">整数</option>
                        <option value="float">浮点数</option>
                        <option value="string">字符串</option>
                        <option value="date">日期</option>
                        <option value="datetime">日期时间</option>
                        <option value="boolean">布尔值</option>
                        <option value="categorical">分类</option>
                        <option value="email">邮箱</option>
                        <option value="phone">手机号</option>
                        <option value="uuid">UUID</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addColumn()">+ 添加列</button>
                <button class="btn btn-outline" onclick="addPreset()">使用预设模板</button>
            </div>
            <div class="col-list" id="col-list"></div>
        </div>

        <!-- Actions -->
        <div class="card">
            <div class="error-banner" id="error-banner">
                <span id="error-banner-msg"></span>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="btn-generate" onclick="generate()">生成数据</button>
                <button class="btn btn-success" id="btn-csv" onclick="exportData('csv')" disabled>导出 CSV</button>
                <button class="btn btn-success" id="btn-json" onclick="exportData('json')" disabled>导出 JSON</button>
            </div>
        </div>

        <!-- Result -->
        <div class="card" id="result-card" style="display:none;">
            <div class="card-title">生成结果</div>
            <div class="stats" id="stats"></div>
            <div class="table-wrap" id="table-wrap"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在生成数据...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let columns = [];
        let lastConfig = null;

        const TYPE_LABELS = {
            integer: "整数", float: "浮点数", string: "字符串",
            date: "日期", datetime: "日期时间", boolean: "布尔值",
            categorical: "分类", email: "邮箱", phone: "手机号", uuid: "UUID",
        };

        const TYPE_HINTS = {
            integer:    { hasRange: true,  rangeLabel: ["最小值","最大值"], hasChoices: false, hasPattern: false },
            float:      { hasRange: true,  rangeLabel: ["最小值","最大值"], hasChoices: false, hasPattern: false },
            string:     { hasRange: true,  rangeLabel: ["最小长度","最大长度"], hasChoices: false, hasPattern: true },
            date:       { hasRange: true,  rangeLabel: ["起始日期","结束日期"], hasChoices: false, hasPattern: false, dateInput: true },
            datetime:   { hasRange: true,  rangeLabel: ["起始时间","结束时间"], hasChoices: false, hasPattern: false, dateInput: true },
            boolean:    { hasRange: false, hasChoices: false, hasPattern: false },
            categorical:{ hasRange: false, hasChoices: true,  hasPattern: false },
            email:      { hasRange: false, hasChoices: false, hasPattern: false },
            phone:      { hasRange: false, hasChoices: false, hasPattern: true },
            uuid:       { hasRange: false, hasChoices: false, hasPattern: false },
        };

        function addColumn(name, dtype, opts = {}) {
            const colName = name || document.getElementById('new-col-name').value.trim();
            const colDtype = dtype || document.getElementById('new-col-dtype').value;
            if (!colName) { showToast('请输入列名', 'error'); return; }

            columns.push({
                name: colName,
                dtype: colDtype,
                min_value: opts.min_value ?? null,
                max_value: opts.max_value ?? null,
                choices: opts.choices ?? null,
                pattern: opts.pattern ?? null,
                null_ratio: opts.null_ratio ?? 0,
                unique: opts.unique ?? false,
                distribution: opts.distribution ?? 'uniform',
                mean: opts.mean ?? null,
                std_dev: opts.std_dev ?? null,
                _error: null,
            });

            document.getElementById('new-col-name').value = '';
            renderColumns();
        }

        function addPreset() {
            columns = [];
            addColumn('id', 'integer', { min_value: 1, max_value: 10000, unique: true });
            addColumn('name', 'string', { min_value: 5, max_value: 12 });
            addColumn('email', 'email');
            addColumn('phone', 'phone');
            addColumn('score', 'float', { min_value: 0, max_value: 100 });
            addColumn('birthday', 'date', { min_value: '1990-01-01', max_value: '2010-12-31' });
            addColumn('active', 'boolean');
            addColumn('city', 'categorical', { choices: '北京,上海,深圳,杭州,成都,广州' });
        }

        function removeColumn(idx) {
            columns.splice(idx, 1);
            renderColumns();
        }

        function clearErrors() {
            document.querySelectorAll('.col-item').forEach(el => el.classList.remove('has-error'));
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
            document.querySelectorAll('.field-error').forEach(el => el.remove());
            const banner = document.getElementById('error-banner');
            banner.classList.remove('show');
        }

        function showFieldError(colIdx, msg) {
            const items = document.querySelectorAll('.col-item');
            if (items[colIdx]) {
                items[colIdx].classList.add('has-error');
                const errSpan = document.createElement('div');
                errSpan.className = 'field-error';
                errSpan.textContent = msg;
                items[colIdx].appendChild(errSpan);
            }
        }

        function showErrorBanner(msg) {
            const banner = document.getElementById('error-banner');
            document.getElementById('error-banner-msg').textContent = msg;
            banner.classList.add('show');
        }

        function validateColumns() {
            clearErrors();
            let valid = true;
            const names = new Set();

            for (let i = 0; i < columns.length; i++) {
                const col = columns[i];
                columns[i]._error = null;

                if (!col.name || !col.name.trim()) {
                    columns[i]._error = '列名不能为空';
                    showFieldError(i, columns[i]._error);
                    valid = false;
                    continue;
                }

                if (names.has(col.name)) {
                    columns[i]._error = `列名"${col.name}"重复`;
                    showFieldError(i, columns[i]._error);
                    valid = false;
                }
                names.add(col.name);

                const hint = TYPE_HINTS[col.dtype] || {};
                if (hint.hasRange && col.min_value !== null && col.max_value !== null) {
                    if (col.dtype === 'date' || col.dtype === 'datetime') {
                        if (col.min_value && col.max_value && col.min_value > col.max_value) {
                            columns[i]._error = '起始值不能大于结束值';
                            showFieldError(i, columns[i]._error);
                            valid = false;
                        }
                    } else {
                        const mn = parseFloat(col.min_value);
                        const mx = parseFloat(col.max_value);
                        if (!isNaN(mn) && !isNaN(mx) && mn > mx) {
                            columns[i]._error = '最小值不能大于最大值';
                            showFieldError(i, columns[i]._error);
                            valid = false;
                        }
                    }
                }

                if (col.dtype === 'categorical' && !col.choices) {
                    columns[i]._error = '分类类型必须填写选项';
                    showFieldError(i, columns[i]._error);
                    valid = false;
                }

                if (col.null_ratio < 0 || col.null_ratio > 1) {
                    columns[i]._error = '空值率必须在 0~1 之间';
                    showFieldError(i, columns[i]._error);
                    valid = false;
                }
            }

            return valid;
        }

        function renderColumns() {
            const list = document.getElementById('col-list');
            if (columns.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding:24px;">暂未配置列，请添加列或使用预设模板</div>';
                return;
            }

            list.innerHTML = columns.map((col, i) => {
                const hint = TYPE_HINTS[col.dtype] || {};
                const label = TYPE_LABELS[col.dtype] || col.dtype;
                const hasError = col._error ? ' has-error' : '';
                let extra = '';

                if (hint.hasRange) {
                    const isDate = hint.dateInput;
                    const inputType = isDate ? 'date' : 'number';
                    extra += `
                        <div class="form-group">
                            <label>${hint.rangeLabel[0]}</label>
                            <input type="${inputType}" value="${col.min_value ?? ''}" onchange="columns[${i}].min_value=this.value||null">
                        </div>
                        <div class="form-group">
                            <label>${hint.rangeLabel[1]}</label>
                            <input type="${inputType}" value="${col.max_value ?? ''}" onchange="columns[${i}].max_value=this.value||null">
                        </div>`;
                }

                if (hint.hasChoices) {
                    extra += `
                        <div class="form-group col-choices">
                            <label>选项（逗号分隔）</label>
                            <input type="text" value="${col.choices ?? ''}" placeholder="如：北京,上海,深圳" onchange="columns[${i}].choices=this.value||null">
                        </div>`;
                }

                if (hint.hasPattern) {
                    extra += `
                        <div class="form-group">
                            <label>模式</label>
                            <input type="text" value="${col.pattern ?? ''}" placeholder="如：<L><d><d><d>" onchange="columns[${i}].pattern=this.value||null">
                        </div>`;
                }

                extra += `
                    <div class="form-group">
                        <label>空值率</label>
                        <input type="number" min="0" max="1" step="0.05" value="${col.null_ratio}" style="min-width:80px" onchange="columns[${i}].null_ratio=parseFloat(this.value)||0">
                    </div>
                    <div class="form-group">
                        <label>唯一</label>
                        <select style="min-width:70px" onchange="columns[${i}].unique=this.value==='true'">
                            <option value="false" ${!col.unique?'selected':''}>否</option>
                            <option value="true" ${col.unique?'selected':''}>是</option>
                        </select>
                    </div>`;

                return `
                    <div class="col-item${hasError}">
                        <span class="col-number">${i + 1}</span>
                        <div class="form-group col-name">
                            <label>列名</label>
                            <input type="text" value="${col.name}" onchange="columns[${i}].name=this.value">
                        </div>
                        <div class="form-group col-dtype">
                            <label>类型</label>
                            <select onchange="columns[${i}].dtype=this.value;renderColumns()">
                                ${Object.keys(TYPE_LABELS)
                                    .map(t => `<option value="${t}" ${col.dtype===t?'selected':''}>${TYPE_LABELS[t]}</option>`).join('')}
                            </select>
                        </div>
                        ${extra}
                        <button class="btn btn-danger" onclick="removeColumn(${i})">删除</button>
                    </div>`;
            }).join('');
        }

        function buildConfig() {
            const rows = parseInt(document.getElementById('row-count').value) || 100;
            const seedVal = document.getElementById('seed').value;
            const seed = seedVal ? parseInt(seedVal) : null;

            const cols = columns.map(col => {
                const obj = { name: col.name, dtype: col.dtype };
                if (col.min_value !== null && col.min_value !== '') obj.min_value = col.min_value;
                if (col.max_value !== null && col.max_value !== '') obj.max_value = col.max_value;
                if (col.choices) obj.choices = typeof col.choices === 'string' ? col.choices.split(',').map(s => s.trim()) : col.choices;
                if (col.pattern) obj.pattern = col.pattern;
                if (col.null_ratio > 0) obj.null_ratio = col.null_ratio;
                if (col.unique) obj.unique = true;
                if (col.distribution !== 'uniform') obj.distribution = col.distribution;
                if (col.mean !== null) obj.mean = col.mean;
                if (col.std_dev !== null) obj.std_dev = col.std_dev;
                return obj;
            });

            return { rows, seed, columns: cols };
        }

        async function generate() {
            clearErrors();

            if (columns.length === 0) {
                showErrorBanner('请至少添加一列配置');
                return;
            }

            if (!validateColumns()) {
                showErrorBanner('配置存在错误，请检查红色高亮的列');
                return;
            }

            const btn = document.getElementById('btn-generate');
            btn.disabled = true;
            document.getElementById('loading').classList.add('active');

            try {
                const config = buildConfig();
                lastConfig = config;

                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config),
                });

                const result = await res.json();
                if (!result.success) {
                    showErrorBanner(result.error || '生成失败');
                    showToast(result.error || '生成失败', 'error');
                    return;
                }

                renderResult(result);
                document.getElementById('btn-csv').disabled = false;
                document.getElementById('btn-json').disabled = false;
                showToast('数据生成成功！', 'success');
            } catch (err) {
                showErrorBanner('请求失败: ' + err.message);
                showToast('请求失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function renderResult(result) {
            const card = document.getElementById('result-card');
            card.style.display = '';

            document.getElementById('stats').innerHTML = `
                <div class="stat-item"><div class="stat-val">${result.rows}</div><div class="stat-label">总行数</div></div>
                <div class="stat-item"><div class="stat-val">${result.columns.length}</div><div class="stat-label">总列数</div></div>
            `;

            if (!result.data || result.data.length === 0) {
                document.getElementById('table-wrap').innerHTML = '<div class="empty-state">无数据</div>';
                return;
            }

            const headers = Object.keys(result.data[0]);
            const maxPreview = 100;
            const rows = result.data.slice(0, maxPreview);

            let html = '<table><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';

            rows.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h];
                    if (val === null || val === '' || val === 'N/A' || val === 'null') {
                        html += `<td><span class="badge badge-null">NULL</span></td>`;
                    } else if (val === true) {
                        html += `<td><span class="badge badge-true">True</span></td>`;
                    } else if (val === false) {
                        html += `<td><span class="badge badge-false">False</span></td>`;
                    } else {
                        html += `<td title="${String(val)}">${val}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            if (result.data.length > maxPreview) {
                html += `<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:13px;">仅展示前 ${maxPreview} 行，共 ${result.data.length} 行</div>`;
            }

            document.getElementById('table-wrap').innerHTML = html;
        }

        async function exportData(fmt) {
            if (!lastConfig) { showToast('请先生成数据', 'error'); return; }

            try {
                const res = await fetch(`/api/export/${fmt}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lastConfig),
                });

                if (!res.ok) {
                    const err = await res.json();
                    showToast(err.error || '导出失败', 'error');
                    return;
                }

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dataset.${fmt}`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('导出成功！', 'success');
            } catch (err) {
                showToast('导出失败: ' + err.message, 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        renderColumns();
    </script>
</body>
</html>
